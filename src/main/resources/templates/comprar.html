<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Namoca - Comprar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
</head>

<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <section class="container-fluid px-0">
        <img src="/img/mockup.png" class="w-100"
            style="object-fit:cover; max-height: 450px; object-position: center 20%;" alt="Mujer con tableta">
    </section>

    <section class="categories-banner">
        <div class="cat-col cat-pills">
            <span class="cat-title">PASTILLAS</span>
            <img src="/img/fotoNamoca.png" alt="Pastillas" class="img-fluid">
        </div>
        <div class="cat-col cat-brush">
            <span class="cat-title">CEPILLO DENTAL</span>
            <img src="/img/cepillo.png" alt="Cepillo Dental" class="img-fluid">
        </div>
        <div class="cat-col cat-floss">
            <span class="cat-title">HILO DENTAL</span>
            <img src="/img/dentalfloss.png" alt="Hilo Dental" class="img-fluid">
        </div>
    </section>

    <section class="container mt-5 mb-5">

        <!-- Mensaje si no hay productos en la base de datos -->
        <div th:if="${#lists.isEmpty(variantes)}" class="text-center py-5">
            <p style="color: #133930; font-size: 1.1rem; font-weight: 600;">
                No hay productos disponibles por el momento.
            </p>
        </div>

        <div class="row g-4" th:unless="${#lists.isEmpty(variantes)}">

            <!-- Tarjeta de producto -->
            <div class="col-md-3" th:each="variante : ${variantes}">

                <th:block th:with="
                    imagenUrl=${(variante.images != null and !variante.images.isEmpty()) 
                                ? ('/img/' + variante.images[0].imageUrl) 
                                : ( (variante.product.images != null and !variante.product.images.isEmpty()) 
                                    ? ('/img/' + variante.product.images[0].imageUrl) 
                                    : '/img/logoNamoca.png' )},
                    nombreCompleto=${variante.product.productName + ' ' + variante.variantName},
                    precio=${variante.product.listPrice != null ? variante.product.listPrice : 0}
                ">
                    <div class="product-card">
                        <div class="img-container">
                            <img th:src="${imagenUrl}" th:alt="${nombreCompleto}"
                                onerror="this.src='/img/fotoNamoca.png'">
                        </div>
                        <div class="product-title" th:text="${nombreCompleto}">Nombre del Producto</div>
                        <div class="product-price" th:text="'$' + ${#numbers.formatDecimal(precio, 1, 2)}">$0.00</div>
                        <button class="btn-add-cart" th:data-id="${variante.productVariantId}"
                            th:data-nombre="${nombreCompleto}" th:data-precio="${precio}" th:data-imagen="${imagenUrl}"
                            onclick="addToCartFromData(this)">
                            Agregar
                        </button>
                    </div>
                </th:block>

            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer th:replace="~{fragments :: footer}"></footer>

    <script src="/js/cart.js"></script>
</body>

</html>
