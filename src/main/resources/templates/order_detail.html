<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Namoca - Detalle de Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
</head>

<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container my-5 pt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="detail-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="section-title mb-0">Detalle del Pedido</h3>
                        <a href="/perfil" class="text-decoration-none text-muted fw-bold">
                            <i class="bi bi-chevron-left"></i> Volver
                        </a>
                    </div>

                    <div class="order-info-header">
                        <div class="row">
                            <div class="col-md-6">
                                <p class="mb-1 text-muted small fw-bold text-uppercase">Número de Pedido</p>
                                <h5 class="fw-bold" th:text="'#' + ${order.orderId}">#123</h5>
                            </div>
                            <div class="col-md-6 text-md-end">
                                <p class="mb-1 text-muted small fw-bold text-uppercase">Fecha de Compra</p>
                                <h5 class="fw-bold" th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">01/01/2026</h5>
                            </div>
                        </div>
                    </div>

                    <h5 class="fw-bold mb-3" style="color: #133930;">Productos</h5>
                    
                    <div class="product-list">
                        <div th:each="item : ${items}" class="product-item">
                            <img th:src="@{${item.productVariant != null and item.productVariant.images != null and !item.productVariant.images.isEmpty() 
                                        ? '/img/' + item.productVariant.images[0].imageUrl 
                                        : '/img/logoNamoca.png'}}" 
                                 class="product-img" alt="Producto">
                            
                            <div class="product-info">
                                <p class="product-name" th:text="${item.product != null ? item.product.productName : 'Producto Desconocido'}">Nombre del Producto</p>
                                <p class="product-meta" th:text="${item.quantity + ' unidad(es) x $' + #numbers.formatDecimal(item.unitPrice, 1, 2)}">1 x $0.00</p>
                            </div>
                            
                            <div class="price-col" th:with="subtotal=${item.unitPrice * item.quantity}">
                                <span th:text="|\$${#numbers.formatDecimal(subtotal, 1, 2)}|">$0.00</span>
                            </div>
                        </div>
                    </div>

                    <div class="total-section">
                        <p class="text-muted mb-1 fw-bold">TOTAL PAGADO</p>
                        <h2 class="fw-bold" style="color: #133930;" 
                            th:text="|\$${#numbers.formatDecimal(total, 1, 2)}|">$0.00</h2>
                    </div>

                    <div class="mt-5 text-center">
                        <a href="/perfil" class="btn-back">Volver a mis pedidos</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
