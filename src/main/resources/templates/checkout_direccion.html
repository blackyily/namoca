<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Namoca - Dirección</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
</head>

<body class="checkout-bg">
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container py-5">
        <!-- Stepper -->
        <div th:replace="~{fragments :: checkoutStepper(activeStep='direccion')}"></div>

        <div class="row gx-5">
            <!-- Formulario de Dirección -->
            <div class="col-lg-7 mb-4">
                <div class="checkout-card">
                    <h2 class="checkout-title">Dirección</h2>
                    <p class="checkout-subtitle">Acutalmente solo hay envios a Mexico</p>

                    <form th:action="@{/checkout/direccion}" method="POST" th:object="${direccion}">
                        <div class="mb-4">
                            <label class="checkout-label">Dirección de la calle</label>
                            <input type="text" th:field="*{street}" class="checkout-input" placeholder="Calle y número" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="checkout-label">Estado</label>
                                <select name="stateId" class="checkout-select" required>
                                    <option value="" disabled th:selected="${direccion.state == null}">Selecciona un estado</option>
                                    <option th:each="st : ${estados}" 
                                            th:value="${st.stateId}" 
                                            th:text="${st.name}"
                                            th:selected="${direccion.state != null && direccion.state.stateId == st.stateId}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="checkout-label">Ciudad</label>
                                <input type="text" th:field="*{city}" class="checkout-input" placeholder="Tu ciudad" required>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label class="checkout-label">Codigo Postal</label>
                            <div class="row">
                                <div class="col-6">
                                    <input type="text" th:field="*{zipCode}" class="checkout-input" placeholder="00000" required>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn-namoca">Confirmar la dirección</button>
                    </form>
                </div>
            </div>

            <!-- Resumen de Compra -->
            <div class="col-lg-5">
                <div th:replace="~{fragments :: checkoutSummary(productos=${productos}, total=${total})}"></div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
