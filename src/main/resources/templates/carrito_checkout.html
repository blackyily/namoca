<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Namoca - Tu Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
</head>

<body class="checkout-bg">
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container py-5" style="max-width: 850px;">
        <!-- Stepper -->
        <div th:replace="~{fragments :: checkoutStepper(activeStep='carrito')}"></div>

        <h2 class="fw-bold mb-4" style="font-size: 2rem;">Tu carrito</h2>

        <div class="checkout-card p-4">
            <!-- Items del Carrito (Backend) -->
            <div th:if="${#lists.isEmpty(productos)}" class="text-center py-4">
                <p class="text-muted">Tu carrito está vacío.</p>
                <a href="/comprar" class="btn btn-success rounded-pill px-4">Ir a la tienda</a>
            </div>

            <div th:each="item : ${productos}" class="summary-item mb-4 pb-3 border-bottom">
                <img th:src="${item.productVariant.product.images != null and !item.productVariant.product.images.isEmpty()} ? ${item.productVariant.product.images[0].imageUrl} : '/img/no-photo.png'"
                    alt="Producto" style="width: 80px; height: 80px; object-fit: cover;">
                <div class="summary-item-info ms-3">
                    <h6 class="fw-bold"
                        th:text="${item.productVariant.product.productName + ' ' + item.productVariant.variantName}">
                        Nombre</h6>
                    <p class="text-muted mb-0" th:text="${'$' + item.priceAtAdd + ' x ' + item.quantity}">$0.00 x 1</p>
                </div>
                <div class="ms-auto text-end">
                    <h5 class="fw-bold mb-0" th:text="${'$' + (item.priceAtAdd * item.quantity)}">$0.00</h5>
                </div>
            </div>

            <div th:if="${!#lists.isEmpty(productos)}" class="row align-items-center mt-4">
                <div class="col-6">
                    <form th:action="@{/carrito/vaciar}" method="POST">
                        <button type="submit" class="btn btn-outline-secondary rounded-pill px-4 fw-bold"
                            style="border-width: 2px;">
                            Vaciar Carrito
                        </button>
                    </form>
                </div>
                <div class="col-6 text-end">
                    <div class="d-flex justify-content-end align-items-center mb-3">
                        <h4 class="fw-bold mb-0 me-4">Total:</h4>
                        <h3 class="fw-bold mb-0" th:text="${'$' + total}" style="font-size: 1.8rem;">$0.00</h3>
                    </div>
                    <a th:href="@{/checkout/direccion}" class="btn-namoca d-inline-block"
                        style="width: auto; padding-left: 3rem; padding-right: 3rem;">
                        Proceder al Pago
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
