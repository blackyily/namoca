<!DOCTYPE html>
<html lang="es">

<head>
    <title>Namoca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
    <style>
        .home-hero h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.15;
            color: #0d1f17;
            padding-left: 30px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg px-4" style="background-color: #133930;">
        <div class="container-fluid">
            <a class="navbar-brand" href="/home">
                <img src="/img/logoNamoca.png" width="125" height="70" alt="Namoca Logo">
            </a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a class="nav-link text-white" href="/comprar">Comprar</a>
                <a class="nav-link text-white" href="/quienesomos">Quienes somos</a>
                <a class="nav-link text-white" href="#">Donar</a>
                <a href="/carrito" class="cart-wrapper ms-2">
                    <i class="bi bi-cart3 text-white fs-5"></i>
                    <span class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- FULL WIDTH HERO -->
    <section class="home-hero">
        <div class="hero-content">
            <p class="small-title">NAMOCA</p>
            <h1>Cambiando vidas<br>una tableta<br>a la vez</h1>
            <button class="btn btn-dark-green mt-3 px-4 py-2 rounded-pill" style="margin-left:30px;">Elígenos</button>
        </div>
        <img src="/img/top.png" alt="Bolsa Namoca" class="hero-bag">
    </section>

    <!-- TAGLINE -->
    <section class="tagline-flex">
        <h2>Sustentable, saludable<br>y accesible</h2>
        <p>
            Una alternativa innovadora para el cuidado de la<br>
            salud bucal mediante tabletas bocales que no requieren agua
        </p>
    </section>

    <!-- BOTTOM IMAGE -->
    <section class="container-fluid px-0">
        <img src="/img/mockup.png" class="w-100" style="object-fit:cover; max-height: 50vw; object-position: center;"
            alt="Mujer con tableta">
    </section>

    <script src="/js/cart.js"></script>
</body>

</html>
