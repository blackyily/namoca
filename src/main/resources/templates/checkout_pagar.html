<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Namoca - Pagar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
</head>

<body class="checkout-bg">
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container py-5">
        <!-- Stepper -->
        <div th:replace="~{fragments :: checkoutStepper(activeStep='pagar')}"></div>

        <div class="row gx-5">
            <!-- Resumen de Compra (Izquierda) -->
            <div class="col-lg-6 mb-4">
                <h2 class="fw-bold mb-4">Tu carrito</h2>
                <div th:replace="~{fragments :: checkoutSummary(productos=${productos}, total=${total})}"></div>
            </div>

            <!-- Datos de Pago (Derecha) -->
            <div class="col-lg-6">
                <div class="payment-info-box">
                    <h2>Datos de la tarjeta</h2>
                    <p class="checkout-subtitle" style="font-size: 0.75rem;">Acutalmente solo se puede hacer el pago por transferencia</p>

                    <div class="bank-details">
                        <div class="mb-4">
                            <label>Tarjeta</label>
                            <p class="mb-0">1234567890</p>
                        </div>
                        
                        <form th:action="@{/checkout/pagar}" method="POST" enctype="multipart/form-data">
                            <div class="file-upload-container">
                                <label class="checkout-label">Subir comprobante de pago</label>
                                <input type="file" name="comprobante" class="file-upload-input" accept="image/*,.pdf" required>
                            </div>

                            <button type="submit" class="btn-namoca mt-5">Realizar el pago</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
