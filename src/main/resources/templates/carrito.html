<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Namoca - Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
</head>

<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container mt-5" style="max-width: 800px;">
        <h2 class="fw-bold mb-4">Tu carrito</h2>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div id="cart-items-container">
                    <!-- Javascript will render items here -->
                </div>
            </div>

            <div class="card-footer bg-white p-4">
                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="mb-0 fw-bold">Total:</h4>
                    <h3 class="mb-0 fw-bold" id="cart-total">$0.00</h3>
                </div>
                <div class="d-flex justify-content-between mt-4">
                    <button class="btn btn-outline-secondary" onclick="clearCart()">Vaciar Carrito</button>
                    <a href="/checkout" class="btn btn-success fw-bold px-4 rounded-pill"
                        style="background-color: #133930; border-color: #133930;">Proceder al Pago</a>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer th:replace="~{fragments :: footer}"></footer>

    <script src="/js/cart.js"></script>
</body>

</html>
