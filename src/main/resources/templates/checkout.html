<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Namoca - Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg px-4" style="background-color: #133930;">
        <div class="container-fluid">
            <a class="navbar-brand" href="/home">
                <img src="/img/logoNamoca.png" width="125" height="70" alt="Namoca Logo">
            </a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a class="nav-link text-white" href="/comprar">Comprar</a>
                <a class="nav-link text-white" href="/quienesomos">Quienes somos</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5 text-center">
        <h2 class="fw-bold mb-4">Finalizar Pago</h2>
        <div class="alert alert-success d-inline-block">
            <h4>¡Has iniciado sesión exitosamente con <span th:text="${customer.firstName}"></span>!</h4>
            <p>Aquí se implementará la pasarela de pagos.</p>
        </div>
        <div class="mt-4">
            <a href="/home" class="btn btn-outline-secondary">Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
