<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Namoca - Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
</head>

<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container my-5 pt-4">
        <!-- Alerta de éxito -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-pill px-4 mb-4 fw-bold border-0 shadow-sm" role="alert" style="background-color: #d1e7dd; color: #0f5132;">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}">Mensaje de éxito</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="profile-card">
                    <h3 class="section-title">Mi Perfil</h3>

                    <div class="mb-4 text-center">
                        <div class="rounded-circle bg-light d-flex align-items-center justify-content-center mx-auto"
                            style="width: 100px; height: 100px;">
                            <i class="bi bi-person-fill text-muted" style="font-size: 3rem;"></i>
                        </div>
                    </div>

                    <div class="info-group">
                        <div class="info-label">Nombre</div>
                        <div class="info-value" th:text="${customer.firstName}">Nombre</div>

                        <div class="info-label">Apellido</div>
                        <div class="info-value" th:text="${customer.lastName}">Apellido</div>

                        <div class="info-label">Correo Electrónico</div>
                        <div class="info-value" th:text="${customer.email}">correo@ejemplo.com</div>
                    </div>

                    <a href="/logout" class="btn btn-outline-danger w-100 rounded-pill mt-4 fw-bold">
                        Cerrar Sesión
                    </a>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="orders-card">
                    <h3 class="section-title">Mis Pedidos</h3>

                    <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
                        <i class="bi bi-bag-x"></i>
                        <h5 class="text-muted">Aún no tienes pedidos.</h5>
                        <a href="/comprar" class="btn-detail d-inline-block mt-3">Ir a la tienda</a>
                    </div>

                    <div th:unless="${#lists.isEmpty(orders)}" class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>ID Orden</th>
                                    <th>Fecha</th>
                                    <th>Estado</th>
                                    <th class="text-end">Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="order : ${orders}">
                                    <td th:text="'#' + ${order.orderId}">#1</td>
                                    <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy')}">01/01/2026</td>
                                    <td>
                                        <span class="badge rounded-pill"
                                            th:classappend="${order.orderStatus == 'PENDIENTE' ? 'badge-pendiente' : 
                                                               (order.orderStatus == 'COMPLETADO' ? 'badge-completado' : 
                                                               (order.orderStatus == 'EN CAMINO' ? 'badge-en-camino' : 'badge-cancelado'))}"
                                            th:text="${order.orderStatus}">
                                            PENDIENTE
                                        </span>
                                    </td>
                                    <td class="text-end">
                                        <a th:href="@{'/perfil/pedido/' + ${order.orderId}}" class="btn-detail">
                                            Ver detalle
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
