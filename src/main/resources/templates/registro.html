<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
</head>
<body class="body-login">

<div class="registro-card">
    <h2>Registro</h2>

    <form action="/registro" method="post">
        
        <!-- Preserve redirect destination -->
        <input type="hidden" name="redirect" th:value="${redirect}">

        <div class="row gx-3 mb-2">
            <div class="col-6">
                <label>Nombre</label>
                <input type="text" name="firstName" required>
            </div>
            <div class="col-6">
                <label>Apellido</label>
                <input type="text" name="lastName" required>
            </div>
        </div>

        <div class="mb-2">
            <label>Correo Electrico</label>
            <input type="email" name="email" required>
        </div>

        <div class="row gx-3 mb-3">
            <div class="col-6">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <div class="col-6">
                <label>Confirmar Contraseña</label>
                <input type="password" name="confirmPassword" required>
            </div>
        </div>

        <button type="submit">Crear cuenta</button>
    </form>

    <p style="color:red; margin-top: 10px;" th:if="${error}" th:text="${error}"></p>

    <div style="margin-top: 15px; text-align: center;">
        <p>¿Ya tienes cuenta? 
            <a th:href="@{/login(redirect=${redirect})}">Inicia sesión</a>
        </p>
    </div>
</div>

</body>
</html>
