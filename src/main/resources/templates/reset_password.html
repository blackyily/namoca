<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Nueva Contraseña - Namoca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/diseño.css">
</head>

<body class="body-login">

    <div class="login-card">
        <h2>Nueva Clave</h2>
        <p class="text-center text-muted mb-4" style="font-size: 0.9rem;">Por favor, ingresa tu nueva contraseña a
            continuación.</p>

        <form th:action="@{/reset-password}" method="post">
            <label>Nueva Contraseña</label>
            <input type="password" name="password" placeholder="Mínimo 8 caracteres" required>

            <label>Confirmar Contraseña</label>
            <input type="password" name="confirmPassword" placeholder="Repite tu contraseña" required>

            <button type="submit" class="mt-3">Actualizar Contraseña</button>
        </form>

        <p style="color:red; text-align: center; margin-top: 15px;" th:if="${error}" th:text="${error}"></p>
    </div>

</body>

</html>
